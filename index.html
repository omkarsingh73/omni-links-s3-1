<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>TaskFlow - Professional Task Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-lg: rgba(0, 0, 0, 0.15);
            --overlay: rgba(0, 0, 0, 0.5);
        }

        [data-theme="dark"] {
            --primary: #818cf8;
            --primary-dark: #6366f1;
            --secondary: #a78bfa;
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --background: #0f172a;
            --surface: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-lg: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed;
            inset: 0;
            background: var(--background);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 60px;
            height: 60px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px var(--shadow);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-icon {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
        }

        .btn-icon:hover {
            background: var(--background);
            color: var(--primary);
        }

        .btn-icon svg {
            width: 20px;
            height: 20px;
        }

        /* Main Layout */
        .main-layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 73px);
        }

        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            position: sticky;
            top: 73px;
            height: calc(100vh - 73px);
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .sidebar.collapsed {
            transform: translateX(-100%);
        }

        .main-content {
            flex: 1;
            padding: 2rem 1.5rem;
            overflow-y: auto;
        }

        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 2px 8px var(--shadow);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 16px var(--shadow-lg);
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .stat-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-icon svg {
            width: 20px;
            height: 20px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-card.total .stat-icon { background: rgba(99, 102, 241, 0.1); color: var(--primary); }
        .stat-card.completed .stat-icon { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .stat-card.pending .stat-icon { background: rgba(245, 158, 11, 0.1); color: var(--warning); }
        .stat-card.overdue .stat-icon { background: rgba(239, 68, 68, 0.1); color: var(--danger); }

        /* Progress Bar */
        .progress-container {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 2px 8px var(--shadow);
            margin-bottom: 2rem;
        }

        .progress-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .progress-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .progress-percentage {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
        }

        .progress-bar {
            height: 12px;
            background: var(--background);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 999px;
            transition: width 0.5s ease;
        }

        /* Search and Filters */
        .controls {
            background: var(--surface);
            padding: 1.5rem;
            border-radius: 16px;
            box-shadow: 0 2px 8px var(--shadow);
            margin-bottom: 2rem;
        }

        .search-box {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-box svg {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: var(--text-secondary);
            pointer-events: none;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 3rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--background);
            color: var(--text-primary);
            font-size: 0.938rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .filter-group {
            flex: 1;
            min-width: 150px;
        }

        .filter-label {
            display: block;
            font-size: 0.813rem;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .select {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            background: var(--background);
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .select:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Task List */
        .tasks-section {
            margin-bottom: 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .task-count {
            font-size: 0.875rem;
            color: var(--text-secondary);
            background: var(--background);
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
        }

        .tasks-grid {
            display: grid;
            gap: 1rem;
        }

        .task-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s ease;
            cursor: move;
            border-left: 4px solid transparent;
        }

        .task-card:hover {
            box-shadow: 0 4px 16px var(--shadow-lg);
            transform: translateY(-2px);
        }

        .task-card.completed {
            opacity: 0.7;
        }

        .task-card.priority-high { border-left-color: var(--danger); }
        .task-card.priority-medium { border-left-color: var(--warning); }
        .task-card.priority-low { border-left-color: var(--success); }

        .task-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .task-title-group {
            flex: 1;
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
        }

        .task-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            margin-top: 2px;
        }

        .task-checkbox:hover {
            border-color: var(--primary);
        }

        .task-checkbox.checked {
            background: var(--primary);
            border-color: var(--primary);
        }

        .task-checkbox svg {
            width: 14px;
            height: 14px;
            color: white;
            display: none;
        }

        .task-checkbox.checked svg {
            display: block;
            animation: checkmark 0.3s ease;
        }

        @keyframes checkmark {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .task-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text-primary);
            word-break: break-word;
        }

        .task-card.completed .task-title {
            text-decoration: line-through;
            color: var(--text-secondary);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .task-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .task-btn:hover {
            background: var(--background);
            color: var(--primary);
        }

        .task-btn.delete:hover {
            color: var(--danger);
        }

        .task-btn svg {
            width: 16px;
            height: 16px;
        }

        .task-description {
            color: var(--text-secondary);
            font-size: 0.938rem;
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
            align-items: center;
        }

        .task-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: 8px;
            font-size: 0.813rem;
            font-weight: 500;
        }

        .task-badge svg {
            width: 14px;
            height: 14px;
        }

        .badge-category {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        .badge-due {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-secondary);
        }

        .badge-due.overdue {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .badge-due.due-soon {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-priority {
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }

        .badge-priority.high {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }

        .badge-priority.medium {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }

        .badge-priority.low {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
        }

        .empty-state svg {
            width: 120px;
            height: 120px;
            color: var(--text-secondary);
            opacity: 0.5;
            margin-bottom: 1.5rem;
        }

        .empty-state h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        /* Buttons */
        .btn {
            padding: 0.875rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-size: 0.938rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-secondary {
            background: var(--background);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn svg {
            width: 18px;
            height: 18px;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 90;
        }

        .fab:hover {
            transform: scale(1.1) rotate(90deg);
            box-shadow: 0 6px 24px rgba(99, 102, 241, 0.5);
        }

        .fab svg {
            width: 24px;
            height: 24px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--surface);
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px var(--shadow-lg);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--background);
            color: var(--text-primary);
        }

        .modal-close svg {
            width: 20px;
            height: 20px;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.938rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .form-input,
        .form-textarea,
        .form-select {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--background);
            color: var(--text-primary);
            font-size: 0.938rem;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .form-input:focus,
        .form-textarea:focus,
        .form-select:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--surface);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Sidebar Menu */
        .menu {
            list-style: none;
        }

        .menu-item {
            margin-bottom: 0.5rem;
        }

        .menu-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            border-radius: 10px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .menu-link:hover,
        .menu-link.active {
            background: var(--background);
            color: var(--primary);
        }

        .menu-link svg {
            width: 20px;
            height: 20px;
        }

        .menu-divider {
            height: 1px;
            background: var(--border);
            margin: 1rem 0;
        }

        .menu-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            margin-bottom: 0.5rem;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 300;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            background: var(--surface);
            color: var(--text-primary);
            padding: 1rem 1.25rem;
            border-radius: 12px;
            box-shadow: 0 8px 24px var(--shadow-lg);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            min-width: 300px;
            pointer-events: all;
            transform: translateX(400px);
            animation: slideIn 0.3s ease forwards;
            border-left: 4px solid var(--primary);
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }

        .toast svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .toast-message {
            flex: 1;
            font-size: 0.938rem;
        }

        @keyframes slideIn {
            to { transform: translateX(0); }
        }

        /* Confirmation Dialog */
        .confirm-dialog {
            text-align: center;
        }

        .confirm-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .confirm-icon svg {
            width: 40px;
            height: 40px;
            color: var(--danger);
        }

        .confirm-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .confirm-message {
            color: var(--text-secondary);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .confirm-actions {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 73px;
                z-index: 90;
                box-shadow: 4px 0 20px var(--shadow-lg);
            }

            .sidebar.collapsed {
                transform: translateX(-100%);
            }

            .main-content {
                width: 100%;
            }
        }

        @media (max-width: 768px) {
            .header-content {
                padding: 1rem;
            }

            .logo span {
                display: none;
            }

            .main-content {
                padding: 1.5rem 1rem;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 1rem;
            }

            .stat-value {
                font-size: 1.75rem;
            }

            .filters {
                flex-direction: column;
            }

            .filter-group {
                min-width: 100%;
            }

            .modal {
                max-width: 100%;
                border-radius: 20px 20px 0 0;
            }

            .fab {
                bottom: 1.5rem;
                right: 1.5rem;
                width: 56px;
                height: 56px;
            }

            .toast-container {
                left: 1rem;
                right: 1rem;
            }

            .toast {
                min-width: auto;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .task-header {
                flex-direction: column;
            }

            .task-actions {
                align-self: flex-end;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--background);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Drag and Drop */
        .task-card.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .task-card.drag-over {
            border-top: 2px solid var(--primary);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-card {
            animation: fadeIn 0.3s ease;
        }
    </style>
</head>

    <script>
        // Application State
        const App = {
            tasks: [],
            filteredTasks: [],
            currentView: 'all',
            currentCategory: null,
            editingTaskId: null,
            theme: 'light',
            sidebarCollapsed: false,
            draggedTask: null,
            confirmCallback: null
        };

        // DOM Elements
        const elements = {
            loadingScreen: document.getElementById('loadingScreen'),
            sidebar: document.getElementById('sidebar'),
            toggleSidebar: document.getElementById('toggleSidebar'),
            toggleTheme: document.getElementById('toggleTheme'),
            addTaskBtn: document.getElementById('addTaskBtn'),
            taskModal: document.getElementById('taskModal'),
            confirmModal: document.getElementById('confirmModal'),
            closeModal: document.getElementById('closeModal'),
            cancelBtn: document.getElementById('cancelBtn'),
            saveTaskBtn: document.getElementById('saveTaskBtn'),
            taskForm: document.getElementById('taskForm'),
            tasksContainer: document.getElementById('tasksContainer'),
            searchInput: document.getElementById('searchInput'),
            filterStatus: document.getElementById('filterStatus'),
            filterPriority: document.getElementById('filterPriority'),
            filterCategory: document.getElementById('filterCategory'),
            sortBy: document.getElementById('sortBy'),
            exportBtn: document.getElementById('exportBtn'),
            importBtn: document.getElementById('importBtn'),
            fileInput: document.getElementById('fileInput'),
            clearAllBtn: document.getElementById('clearAllBtn'),
            toastContainer: document.getElementById('toastContainer'),
            confirmCancel: document.getElementById('confirmCancel'),
            confirmOk: document.getElementById('confirmOk'),
            confirmMessage: document.getElementById('confirmMessage'),
            modalTitle: document.getElementById('modalTitle')
        };

        // Initialize App
        function init() {
            loadTheme();
            loadTasks();
            setupEventListeners();
            populateCategoryFilter();
            renderTasks();
            updateStats();
            
            setTimeout(() => {
                elements.loadingScreen.classList.add('hidden');
            }, 500);
        }

        // Load Theme
        function loadTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            App.theme = savedTheme;
            document.documentElement.setAttribute('data-theme', savedTheme);
        }

        // Toggle Theme
        function toggleTheme() {
            App.theme = App.theme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', App.theme);
            localStorage.setItem('theme', App.theme);
            showToast('Theme changed successfully', 'success');
        }

        // Load Tasks
        function loadTasks() {
            const savedTasks = localStorage.getItem('tasks');
            if (savedTasks) {
                App.tasks = JSON.parse(savedTasks);
            } else {
                // Create demo tasks
                App.tasks = createDemoTasks();
                saveTasks();
            }
            App.filteredTasks = [...App.tasks];
        }

        // Create Demo Tasks
        function createDemoTasks() {
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const nextWeek = new Date(today);
            nextWeek.setDate(nextWeek.getDate() + 7);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            return [
                {
                    id: generateId(),
                    title: 'Complete Project Proposal',
                    description: 'Finish the Q4 project proposal and send it to the team for review',
                    createdDate: new Date(today.getTime() - 86400000 * 2).toISOString(),
                    dueDate: tomorrow.toISOString().split('T')[0],
                    priority: 'high',
                    status: 'pending',
                    category: 'Work'
                },
                {
                    id: generateId(),
                    title: 'Buy Groceries',
                    description: 'Milk, eggs, bread, vegetables, and fruits',
                    createdDate: new Date(today.getTime() - 86400000).toISOString(),
                    dueDate: today.toISOString().split('T')[0],
                    priority: 'medium',
                    status: 'pending',
                    category: 'Shopping'
                },
                {
                    id: generateId(),
                    title: 'Morning Workout',
                    description: '30 minutes cardio and strength training',
                    createdDate: new Date(today.getTime() - 86400000 * 3).toISOString(),
                    dueDate: today.toISOString().split('T')[0],
                    priority: 'high',
                    status: 'completed',
                    category: 'Health'
                },
                {
                    id: generateId(),
                    title: 'Schedule Team Meeting',
                    description: 'Organize weekly sync-up meeting with the development team',
                    createdDate: new Date(today.getTime() - 86400000 * 5).toISOString(),
                    dueDate: nextWeek.toISOString().split('T')[0],
                    priority: 'medium',
                    status: 'pending',
                    category: 'Work'
                },
                {
                    id: generateId(),
                    title: 'Update Resume',
                    description: 'Add recent projects and update skills section',
                    createdDate: new Date(today.getTime() - 86400000 * 7).toISOString(),
                    dueDate: yesterday.toISOString().split('T')[0],
                    priority: 'low',
                    status: 'pending',
                    category: 'Personal'
                },
                {
                    id: generateId(),
                    title: 'Read Book Chapter',
                    description: 'Complete chapter 5 of "Atomic Habits"',
                    createdDate: new Date(today.getTime() - 86400000 * 4).toISOString(),
                    dueDate: today.toISOString().split('T')[0],
                    priority: 'low',
                    status: 'completed',
                    category: 'Personal'
                }
            ];
        }

        // Save Tasks
        function saveTasks() {
            localStorage.setItem('tasks', JSON.stringify(App.tasks));
        }

        // Generate Unique ID
        function generateId() {
            return Date.now().toString(36) + Math.random().toString(36).substr(2);
        }

        // Setup Event Listeners
        function setupEventListeners() {
            // Theme Toggle
            elements.toggleTheme.addEventListener('click', toggleTheme);

            // Sidebar Toggle
            elements.toggleSidebar.addEventListener('click', () => {
                App.sidebarCollapsed = !App.sidebarCollapsed;
                elements.sidebar.classList.toggle('collapsed', App.sidebarCollapsed);
            });

            // Add Task
            elements.addTaskBtn.addEventListener('click', openTaskModal);

            // Modal Controls
            elements.closeModal.addEventListener('click', closeTaskModal);
            elements.cancelBtn.addEventListener('click', closeTaskModal);
            elements.saveTaskBtn.addEventListener('click', saveTask);

            // Modal Overlay Click
            elements.taskModal.addEventListener('click', (e) => {
                if (e.target === elements.taskModal) closeTaskModal();
            });

            // Search
            elements.searchInput.addEventListener('input', debounce(applyFilters, 300));

            // Filters
            elements.filterStatus.addEventListener('change', applyFilters);
            elements.filterPriority.addEventListener('change', applyFilters);
            elements.filterCategory.addEventListener('change', applyFilters);
            elements.sortBy.addEventListener('change', applyFilters);

            // Export/Import
            elements.exportBtn.addEventListener('click', exportTasks);
            elements.importBtn.addEventListener('click', () => elements.fileInput.click());
            elements.fileInput.addEventListener('change', importTasks);

            // Clear All
            elements.clearAllBtn.addEventListener('click', clearAllTasks);

            // Confirm Modal
            elements.confirmCancel.addEventListener('click', closeConfirmModal);
            elements.confirmOk.addEventListener('click', () => {
                if (App.confirmCallback) {
                    App.confirmCallback();
                    App.confirmCallback = null;
                }
                closeConfirmModal();
            });

            elements.confirmModal.addEventListener('click', (e) => {
                if (e.target === elements.confirmModal) closeConfirmModal();
            });

            // Menu Links
            document.querySelectorAll('.menu-link[data-view]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    App.currentView = link.dataset.view;
                    App.currentCategory = null;
                    applyFilters();
                });
            });

            document.querySelectorAll('.menu-link[data-category]').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.menu-link').forEach(l => l.classList.remove('active'));
                    link.classList.add('active');
                    App.currentView = 'category';
                    App.currentCategory = link.dataset.category;
                    applyFilters();
                });
            });

            // Keyboard Shortcuts
            document.addEventListener('keydown', (e) => {
                // Ctrl/Cmd + N: New Task
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    openTaskModal();
                }
                // Escape: Close Modal
                if (e.key === 'Escape') {
                    closeTaskModal();
                    closeConfirmModal();
                }
            });

            // Form Submit
            elements.taskForm.addEventListener('submit', (e) => {
                e.preventDefault();
                saveTask();
            });
        }

        // Open Task Modal
        function openTaskModal(taskId = null) {
            App.editingTaskId = taskId;
            
            if (taskId) {
                const task = App.tasks.find(t => t.id === taskId);
                if (task) {
                    elements.modalTitle.textContent = 'Edit Task';
                    document.getElementById('taskTitle').value = task.title;
                    document.getElementById('taskDescription').value = task.description || '';
                    document.getElementById('taskDueDate').value = task.dueDate;
                    document.getElementById('taskPriority').value = task.priority;
                    document.getElementById('taskCategory').value = task.category;
                }
            } else {
                elements.modalTitle.textContent = 'Add New Task';
                elements.taskForm.reset();
                // Set default due date to tomorrow
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                document.getElementById('taskDueDate').value = tomorrow.toISOString().split('T')[0];
            }
            
            elements.taskModal.classList.add('active');
        }

        // Close Task Modal
        function closeTaskModal() {
            elements.taskModal.classList.remove('active');
            App.editingTaskId = null;
            elements.taskForm.reset();
        }

        // Save Task
        function saveTask() {
            const title = document.getElementById('taskTitle').value.trim();
            const description = document.getElementById('taskDescription').value.trim();
            const dueDate = document.getElementById('taskDueDate').value;
            const priority = document.getElementById('taskPriority').value;
            const category = document.getElementById('taskCategory').value;

            if (!title || !dueDate) {
                showToast('Please fill in all required fields', 'error');
                return;
            }

            if (App.editingTaskId) {
                // Update existing task
                const taskIndex = App.tasks.findIndex(t => t.id === App.editingTaskId);
                if (taskIndex !== -1) {
                    App.tasks[taskIndex] = {
                        ...App.tasks[taskIndex],
                        title,
                        description,
                        dueDate,
                        priority,
                        category
                    };
                    showToast('Task updated successfully', 'success');
                }
            } else {
                // Create new task
                const newTask = {
                    id: generateId(),
                    title,
                    description,
                    createdDate: new Date().toISOString(),
                    dueDate,
                    priority,
                    status: 'pending',
                    category
                };
                App.tasks.unshift(newTask);
                showToast('Task created successfully', 'success');
            }

            saveTasks();
            applyFilters();
            updateStats();
            closeTaskModal();
        }

        // Delete Task
        function deleteTask(taskId) {
            showConfirm('Are you sure you want to delete this task?', () => {
                App.tasks = App.tasks.filter(t => t.id !== taskId);
                saveTasks();
                applyFilters();
                updateStats();
                showToast('Task deleted successfully', 'success');
            });
        }

        // Toggle Task Status
        function toggleTaskStatus(taskId) {
            const task = App.tasks.find(t => t.id === taskId);
            if (task) {
                task.status = task.status === 'pending' ? 'completed' : 'pending';
                saveTasks();
                applyFilters();
                updateStats();
                
                const message = task.status === 'completed' ? 
                    'Task completed! 🎉' : 'Task marked as pending';
                showToast(message, 'success');
            }
        }

        // Clear All Tasks
        function clearAllTasks() {
            if (App.tasks.length === 0) {
                showToast('No tasks to clear', 'warning');
                return;
            }
            
            showConfirm('Are you sure you want to delete all tasks? This cannot be undone.', () => {
                App.tasks = [];
                saveTasks();
                applyFilters();
                updateStats();
                showToast('All tasks cleared', 'success');
            });
        }

        // Apply Filters
        function applyFilters() {
            let filtered = [...App.tasks];

            // View Filter
            const today = new Date().toISOString().split('T')[0];
            
            switch (App.currentView) {
                case 'today':
                    filtered = filtered.filter(t => t.dueDate === today && t.status === 'pending');
                    break;
                case 'upcoming':
                    filtered = filtered.filter(t => t.dueDate >= today && t.status === 'pending');
                    break;
                case 'completed':
                    filtered = filtered.filter(t => t.status === 'completed');
                    break;
                case 'category':
                    if (App.currentCategory) {
                        filtered = filtered.filter(t => t.category === App.currentCategory);
                    }
                    break;
            }

            // Search Filter
            const searchTerm = elements.searchInput.value.toLowerCase().trim();
            if (searchTerm) {
                filtered = filtered.filter(t => 
                    t.title.toLowerCase().includes(searchTerm) ||
                    (t.description && t.description.toLowerCase().includes(searchTerm))
                );
            }

            // Status Filter
            const statusFilter = elements.filterStatus.value;
            if (statusFilter !== 'all') {
                filtered = filtered.filter(t => t.status === statusFilter);
            }

            // Priority Filter
            const priorityFilter = elements.filterPriority.value;
            if (priorityFilter !== 'all') {
                filtered = filtered.filter(t => t.priority === priorityFilter);
            }

            // Category Filter
            const categoryFilter = elements.filterCategory.value;
            if (categoryFilter !== 'all') {
                filtered = filtered.filter(t => t.category === categoryFilter);
            }

            // Sort
            const sortBy = elements.sortBy.value;
            filtered.sort((a, b) => {
                switch (sortBy) {
                    case 'dueDate':
                        return new Date(a.dueDate) - new Date(b.dueDate);
                    case 'createdDate':
                        return new Date(b.createdDate) - new Date(a.createdDate);
                    case 'priority':
                        const priorityOrder = { high: 0, medium: 1, low: 2 };
                        return priorityOrder[a.priority] - priorityOrder[b.priority];
                    case 'title':
                        return a.title.localeCompare(b.title);
                    default:
                        return 0;
                }
            });

            App.filteredTasks = filtered;
            renderTasks();
        }

        // Render Tasks
        function renderTasks() {
            const container = elements.tasksContainer;
            
            if (App.filteredTasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 11l3 3L22 4"></path>
                            <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                        </svg>
                        <h3>No tasks found</h3>
                        <p>Create a new task to get started</p>
                        <button class="btn btn-primary" onclick="openTaskModal()">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                            Add Task
                        </button>
                    </div>
                `;
                document.getElementById('taskCount').textContent = '0 tasks';
                return;
            }

            container.innerHTML = App.filteredTasks.map(task => {
                const dueStatus = getDueStatus(task.dueDate);
                const completedClass = task.status === 'completed' ? 'completed' : '';
                
                return `
                    <div class="task-card priority-${task.priority} ${completedClass}" 
                         draggable="true" 
                         data-task-id="${task.id}"
                         ondragstart="handleDragStart(event)"
                         ondragover="handleDragOver(event)"
                         ondrop="handleDrop(event)"
                         ondragend="handleDragEnd(event)">
                        <div class="task-header">
                            <div class="task-title-group">
                                <div class="task-checkbox ${task.status === 'completed' ? 'checked' : ''}" 
                                     onclick="toggleTaskStatus('${task.id}')">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </div>
                                <h3 class="task-title">${escapeHtml(task.title)}</h3>
                            </div>
                            <div class="task-actions">
                                <button class="task-btn" onclick="openTaskModal('${task.id}')" title="Edit">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"></path>
                                        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                </button>
                                <button class="task-btn delete" onclick="deleteTask('${task.id}')" title="Delete">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polyline points="3 6 5 6 21 6"></polyline>
                                        <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        ${task.description ? `<p class="task-description">${escapeHtml(task.description)}</p>` : ''}
                        <div class="task-meta">
                            <span class="task-badge badge-category">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"></path>
                                    <line x1="7" y1="7" x2="7.01" y2="7"></line>
                                </svg>
                                ${task.category}
                            </span>
                            <span class="task-badge badge-due ${dueStatus}">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="16" y1="2" x2="16" y2="6"></line>
                                    <line x1="8" y1="2" x2="8" y2="6"></line>
                                    <line x1="3" y1="10" x2="21" y2="10"></line>
                                </svg>
                                ${formatDate(task.dueDate)}
                            </span>
                            <span class="task-badge badge-priority ${task.priority}">
                                ${task.priority}
                            </span>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('taskCount').textContent = 
                `${App.filteredTasks.length} task${App.filteredTasks.length !== 1 ? 's' : ''}`;
        }

        // Update Stats
        function updateStats() {
            const total = App.tasks.length;
            const completed = App.tasks.filter(t => t.status === 'completed').length;
            const pending = App.tasks.filter(t => t.status === 'pending').length;
            const today = new Date().toISOString().split('T')[0];
            const overdue = App.tasks.filter(t => 
                t.status === 'pending' && t.dueDate < today
            ).length;

            document.getElementById('totalTasks').textContent = total;
            document.getElementById('completedTasks').textContent = completed;
            document.getElementById('pendingTasks').textContent = pending;
            document.getElementById('overdueTasks').textContent = overdue;

            // Update progress
            const percentage = total > 0 ? Math.round((completed / total) * 100) : 0;
            document.getElementById('progressPercentage').textContent = `${percentage}%`;
            document.getElementById('progressFill').style.width = `${percentage}%`;
        }

        // Populate Category Filter
        function populateCategoryFilter() {
            const categories = [...new Set(App.tasks.map(t => t.category))];
            const select = elements.filterCategory;
            
            categories.forEach(category => {
                if (!select.querySelector(`option[value="${category}"]`)) {
                    const option = document.createElement('option');
                    option.value = category;
                    option.textContent = category;
                    select.appendChild(option);
                }
            });
        }

        // Get Due Status
        function getDueStatus(dueDate) {
            const today = new Date().toISOString().split('T')[0];
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const tomorrowStr = tomorrow.toISOString().split('T')[0];

            if (dueDate < today) return 'overdue';
            if (dueDate === today || dueDate === tomorrowStr) return 'due-soon';
            return '';
        }

        // Format Date
        function formatDate(dateString) {
            const date = new Date(dateString + 'T00:00:00');
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            const yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);

            const targetDate = new Date(date);
            targetDate.setHours(0, 0, 0, 0);

            if (targetDate.getTime() === today.getTime()) return 'Today';
            if (targetDate.getTime() === tomorrow.getTime()) return 'Tomorrow';
            if (targetDate.getTime() === yesterday.getTime()) return 'Yesterday';

            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        // Export Tasks
        function exportTasks() {
            if (App.tasks.length === 0) {
                showToast('No tasks to export', 'warning');
                return;
            }

            const dataStr = JSON.stringify(App.tasks, null, 2);
            const dataBlob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `tasks-${new Date().toISOString().split('T')[0]}.json`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('Tasks exported successfully', 'success');
        }

        // Import Tasks
        function importTasks(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) {
                        throw new Error('Invalid format');
                    }

                    showConfirm(`Import ${imported.length} task(s)? This will replace all existing tasks.`, () => {
                        App.tasks = imported;
                        saveTasks();
                        applyFilters();
                        updateStats();
                        populateCategoryFilter();
                        showToast('Tasks imported successfully', 'success');
                    });
                } catch (error) {
                    showToast('Failed to import tasks. Invalid file format.', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // Drag and Drop Handlers
        function handleDragStart(event) {
            App.draggedTask = event.target.dataset.taskId;
            event.target.classList.add('dragging');
            event.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(event) {
            event.preventDefault();
            event.dataTransfer.dropEffect = 'move';
            const target = event.target.closest('.task-card');
            if (target && target.dataset.taskId !== App.draggedTask) {
                target.classList.add('drag-over');
            }
        }

        function handleDrop(event) {
            event.preventDefault();
            const target = event.target.closest('.task-card');
            if (!target || target.dataset.taskId === App.draggedTask) return;

            const draggedIndex = App.filteredTasks.findIndex(t => t.id === App.draggedTask);
            const targetIndex = App.filteredTasks.findIndex(t => t.id === target.dataset.taskId);

            if (draggedIndex !== -1 && targetIndex !== -1) {
                const draggedTask = App.filteredTasks[draggedIndex];
                App.filteredTasks.splice(draggedIndex, 1);
                App.filteredTasks.splice(targetIndex, 0, draggedTask);

                // Update main tasks array
                App.tasks = App.filteredTasks.concat(
                    App.tasks.filter(t => !App.filteredTasks.find(ft => ft.id === t.id))
                );
                
                saveTasks();
                renderTasks();
            }

            target.classList.remove('drag-over');
        }

        function handleDragEnd(event) {
            event.target.classList.remove('dragging');
            document.querySelectorAll('.task-card').forEach(card => {
                card.classList.remove('drag-over');
            });
        }

        // Show Toast
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            
            const icon = type === 'success' ? 
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>' :
                type === 'error' ?
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>' :
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>';
            
            toast.innerHTML = `
                ${icon}
                <span class="toast-message">${escapeHtml(message)}</span>
            `;
            
            elements.toastContainer.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Show Confirm
        function showConfirm(message, callback) {
            elements.confirmMessage.textContent = message;
            App.confirmCallback = callback;
            elements.confirmModal.classList.add('active');
        }

        // Close Confirm Modal
        function closeConfirmModal() {
            elements.confirmModal.classList.remove('active');
            App.confirmCallback = null;
        }

        // Utility Functions
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize app when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
